<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token 余额聚合</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800" x-data="app()" x-init="init()">

  <!-- 登录页 -->
  <template x-if="!loggedIn">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <h1 class="text-xl font-bold mb-1">🔑 Token 余额聚合</h1>
        <p class="text-sm text-slate-500 mb-6">请输入管理员密码</p>
        <form @submit.prevent="login()" class="space-y-4">
          <input type="password" x-model="loginPassword" placeholder="密码"
                 class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
          <p x-show="loginError" class="text-sm text-red-500" x-text="loginError"></p>
          <button type="submit" :disabled="loginLoading"
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition disabled:opacity-50">
            <span x-show="!loginLoading">登录</span>
            <span x-show="loginLoading">登录中…</span>
          </button>
        </form>
      </div>
    </div>
  </template>

  <!-- 主面板 -->
  <template x-if="loggedIn">
    <div class="max-w-6xl mx-auto px-4 py-8">

      <!-- 顶栏 -->
      <header class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-bold">📊 Token 余额聚合</h1>
          <p class="text-sm text-slate-500 mt-1" x-show="lastRefresh">
            上次刷新：<span x-text="lastRefresh"></span>
          </p>
        </div>
        <div class="flex items-center gap-2">
          <button @click="refresh()" :disabled="refreshing"
                  class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg disabled:opacity-50">
            <span x-show="!refreshing">🔄 刷新</span>
            <span x-show="refreshing">刷新中…</span>
          </button>
          <button @click="tab='settings'; loadProviders()"
                  :class="tab==='settings' ? 'bg-slate-800 text-white' : 'bg-white border'"
                  class="text-sm font-medium px-4 py-2 rounded-lg">⚙️ 设置</button>
          <button @click="tab='trend'; loadTrend()"
                  :class="tab==='trend' ? 'bg-slate-800 text-white' : 'bg-white border'"
                  class="text-sm font-medium px-4 py-2 rounded-lg">📈 趋势</button>
          <button @click="tab='models'; loadModels()"
                  :class="tab==='models' ? 'bg-slate-800 text-white' : 'bg-white border'"
                  class="text-sm font-medium px-4 py-2 rounded-lg">🧠 模型</button>
          <button @click="logout()" class="text-sm text-slate-500 hover:text-slate-800 px-3 py-2">退出</button>
        </div>
      </header>

      <!-- 总览 -->
      <div x-show="tab==='overview'">
        <!-- 余额合计 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-6 flex items-center gap-6">
          <div>
            <p class="text-xs text-slate-500 uppercase tracking-wide">合计余额</p>
            <p class="text-3xl font-bold text-slate-900 mt-1" x-text="totalBalanceText"></p>
          </div>
          <div class="h-10 w-px bg-slate-200"></div>
          <div>
            <p class="text-xs text-slate-500 uppercase tracking-wide">监控账户</p>
            <p class="text-3xl font-bold text-slate-900 mt-1" x-text="accounts.length"></p>
          </div>
          <div class="h-10 w-px bg-slate-200"></div>
          <div>
            <p class="text-xs text-slate-500 uppercase tracking-wide">异常</p>
            <p class="text-3xl font-bold mt-1" :class="errorCount ? 'text-red-600' : 'text-emerald-600'" x-text="errorCount"></p>
          </div>
        </div>

        <!-- 卡片网格 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <template x-for="acc in accounts" :key="acc.id">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5"
                 :class="acc.latest?.raw_error ? 'border-red-300 bg-red-50' : ''">

              <div class="flex items-start justify-between mb-3">
                <div>
                  <p class="font-semibold text-slate-900" x-text="acc.display_name"></p>
                  <p class="text-xs text-slate-400 mt-0.5" x-text="providerLabel(acc.provider)"></p>
                </div>
                <span class="text-xs px-2 py-0.5 rounded-full"
                      :class="acc.enabled ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'"
                      x-text="acc.enabled ? '启用' : '停用'"></span>
              </div>

              <!-- 有错误 -->
              <template x-if="acc.latest?.raw_error">
                <div class="text-sm text-red-600 py-4">
                  ⚠️ <span x-text="acc.latest.raw_error"></span>
                </div>
              </template>

              <!-- 还没数据 -->
              <template x-if="!acc.latest">
                <div class="text-sm text-slate-400 py-6 text-center">点击「刷新」获取数据</div>
              </template>

              <!-- 余额型 -->
              <template x-if="acc.latest && !acc.latest.raw_error && acc.latest.type==='balance'">
                <div>
                  <p class="text-3xl font-bold text-slate-900">
                    <span x-text="currencySymbol(acc.latest.currency)"></span><span x-text="formatBalance(acc.latest.balance)"></span>
                  </p>
                  <p class="text-xs text-slate-400 mt-1" x-text="acc.latest.currency || ''"></p>
                </div>
              </template>

              <!-- 窗口型（阶段2 接入后会有 tiers） -->
              <template x-if="acc.latest && !acc.latest.raw_error && acc.latest.type==='window' && acc.latest.tiers">
                <div class="space-y-3">
                  <!-- 套餐等级 -->
                  <div x-show="acc.latest.plan_level" class="text-xs text-slate-400">
                    套餐：<span class="font-medium text-slate-600 uppercase" x-text="acc.latest.plan_level"></span>
                  </div>
                  <template x-for="(t, i) in acc.latest.tiers" :key="i">
                    <div>
                      <div class="flex justify-between text-xs text-slate-500 mb-1">
                        <span x-text="tierLabel(t.type)"></span>
                        <span><span x-text="t.used_percent.toFixed(1)"></span>% 已用</span>
                      </div>
                      <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all"
                             :class="t.used_percent >= 90 ? 'bg-red-500' : (t.used_percent >= 70 ? 'bg-amber-500' : 'bg-emerald-500')"
                             :style="`width: ${Math.min(100, t.used_percent)}%`"></div>
                      </div>
                      <p class="text-xs text-slate-400 mt-1" x-show="t.resets_at">
                        <span x-text="countdown(t.resets_at)"></span>后重置
                      </p>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- 空状态 -->
          <div x-show="accounts.length === 0" class="col-span-full bg-white rounded-2xl border border-dashed border-slate-300 p-12 text-center">
            <p class="text-slate-500 mb-4">还没有添加任何账户</p>
            <button @click="tab='settings'; loadProviders()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm hover:bg-indigo-700">去添加 →</button>
          </div>
        </div>
      </div>

      <!-- 设置页 -->
      <div x-show="tab==='settings'" class="space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h2 class="font-semibold text-lg mb-4">➕ 添加账户</h2>
          <form @submit.prevent="createAccount()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-slate-600 mb-1">服务商</label>
              <select x-model="form.provider" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <template x-for="p in providers" :key="p.provider">
                  <option :value="p.provider" x-text="p.display_name"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-sm text-slate-600 mb-1">显示名</label>
              <input x-model="form.display_name" placeholder="如：我的 DeepSeek" class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm text-slate-600 mb-1">API Key</label>
              <input type="password" x-model="form.api_key" placeholder="sk-..." class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm">
            </div>
            <div class="md:col-span-2 flex items-center gap-3">
              <button type="submit" :disabled="creating"
                      class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg disabled:opacity-50">
                <span x-show="!creating">添加</span><span x-show="creating">添加中…</span>
              </button>
              <p x-show="formError" class="text-sm text-red-500" x-text="formError"></p>
            </div>
          </form>
        </div>

        <!-- 已有账户列表 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h2 class="font-semibold text-lg mb-4">📋 已有账户</h2>
          <div class="space-y-2">
            <template x-for="acc in accounts" :key="acc.id">
              <div class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
                <div>
                  <p class="font-medium" x-text="acc.display_name"></p>
                  <p class="text-xs text-slate-400" x-text="providerLabel(acc.provider)"></p>
                </div>
                <div class="flex items-center gap-2">
                  <button @click="toggleEnabled(acc)"
                          class="text-xs px-3 py-1 rounded border"
                          :class="acc.enabled ? 'border-emerald-300 text-emerald-700 bg-emerald-50' : 'border-slate-300 text-slate-500'"
                          x-text="acc.enabled ? '启用中' : '已停用'"></button>
                  <button @click="deleteAccount(acc)" class="text-xs px-3 py-1 rounded border border-red-300 text-red-600 hover:bg-red-50">删除</button>
                </div>
              </div>
            </template>
            <p x-show="accounts.length===0" class="text-sm text-slate-400 text-center py-4">暂无账户</p>
          </div>
        </div>

        <!-- 通知配置 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h2 class="font-semibold text-lg mb-4">🔔 通知配置</h2>
          <p class="text-sm text-slate-500 mb-4">配置告警和每日报告的发送渠道。只填你用的那个就行，其它留空。</p>

          <!-- 告警阈值 -->
          <div class="mb-6 p-4 bg-slate-50 rounded-lg">
            <p class="text-sm font-medium text-slate-700 mb-3">默认告警阈值（每账户可在账户配置里单独覆盖）</p>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-slate-500 mb-1">余额告警（元）</label>
                <input type="number" x-model="notify.alert_balance_threshold" placeholder="10"
                       class="w-full px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label class="block text-xs text-slate-500 mb-1">窗口已用告警（%）</label>
                <input type="number" x-model="notify.alert_used_threshold" placeholder="90"
                       class="w-full px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
            </div>
          </div>

          <!-- Server 酱 -->
          <div class="mb-4 p-4 border border-slate-200 rounded-lg">
            <p class="text-sm font-medium text-slate-700 mb-2">💬 Server 酱（微信推送）<span class="text-xs text-slate-400 ml-2">推荐，去 sct.ftqq.com 申请</span></p>
            <input type="password" x-model="notify.notify_serverchan_key" :placeholder="notify._loaded?.notify_serverchan_key?.masked || 'SCTxxxx'"
                   class="w-full px-3 py-1.5 text-sm border border-slate-300 rounded font-mono outline-none focus:ring-2 focus:ring-indigo-500">
          </div>

          <!-- 折叠：Telegram / 邮件 -->
          <details class="mb-4">
            <summary class="text-sm text-slate-500 cursor-pointer hover:text-slate-700">展开 Telegram / 邮件配置（可选）</summary>
            <div class="mt-3 space-y-3">
              <div class="p-4 border border-slate-200 rounded-lg">
                <p class="text-sm font-medium text-slate-700 mb-2">✈️ Telegram Bot</p>
                <div class="grid grid-cols-2 gap-3">
                  <input type="password" x-model="notify.notify_telegram_bot_token" placeholder="Bot Token"
                         class="px-3 py-1.5 text-sm border border-slate-300 rounded font-mono outline-none focus:ring-2 focus:ring-indigo-500">
                  <input x-model="notify.notify_telegram_chat_id" placeholder="Chat ID"
                         class="px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
              </div>
              <div class="p-4 border border-slate-200 rounded-lg">
                <p class="text-sm font-medium text-slate-700 mb-2">📧 邮件（SMTP）</p>
                <div class="grid grid-cols-3 gap-3">
                  <input x-model="notify.notify_smtp_host" placeholder="SMTP 主机"
                         class="px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
                  <input x-model="notify.notify_smtp_port" placeholder="端口(465)"
                         class="px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
                  <input x-model="notify.notify_smtp_user" placeholder="发件邮箱"
                         class="px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
                  <input type="password" x-model="notify.notify_smtp_password" placeholder="授权码"
                         class="px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
                  <input x-model="notify.notify_smtp_to" placeholder="收件邮箱（默认同发件）"
                         class="col-span-2 px-3 py-1.5 text-sm border border-slate-300 rounded outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
              </div>
            </div>
          </details>

          <div class="flex items-center gap-3">
            <button @click="saveNotify()" :disabled="notify.saving"
                    class="bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50">
              <span x-show="!notify.saving">💾 保存配置</span><span x-show="notify.saving">保存中…</span>
            </button>
            <button @click="testNotify()" :disabled="notify.testing"
                    class="border border-slate-300 text-sm font-medium px-4 py-2 rounded-lg hover:bg-slate-50 disabled:opacity-50">
              <span x-show="!notify.testing">🔔 测试通知</span><span x-show="notify.testing">发送中…</span>
            </button>
            <span x-show="notify.msg" class="text-sm" :class="notify.ok ? 'text-emerald-600' : 'text-red-500'" x-text="notify.msg"></span>
          </div>
        </div>


        <button @click="tab='overview'" class="text-sm text-indigo-600 hover:underline">← 返回总览</button>
      </div>

      <!-- 趋势页 -->
      <div x-show="tab==='trend'" class="space-y-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div class="flex flex-wrap items-end gap-4 mb-4">
            <div>
              <label class="block text-sm text-slate-600 mb-1">账户</label>
              <select x-model="trend.accountId" @change="loadTrend()"
                      class="px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">— 选择账户 —</option>
                <template x-for="a in accounts" :key="a.id">
                  <option :value="a.id" x-text="a.display_name + ' (' + providerLabel(a.provider) + ')'"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-sm text-slate-600 mb-1">范围</label>
              <select x-model="trend.days" @change="loadTrend()"
                      class="px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="1">最近 1 天</option>
                <option value="7">最近 7 天</option>
                <option value="30">最近 30 天</option>
                <option value="90">最近 90 天</option>
              </select>
            </div>
            <button @click="loadTrend()" class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-indigo-700">刷新图表</button>
          </div>
          <p x-show="trend.error" class="text-sm text-red-500" x-text="trend.error"></p>
          <p x-show="!trend.accountId" class="text-sm text-slate-400 py-8 text-center">请选择一个账户查看趋势</p>
          <p x-show="trend.accountId && trend.points.length===0 && !trend.loading" class="text-sm text-slate-400 py-8 text-center">暂无历史数据（多刷新几次或等定时任务跑一会儿）</p>
          <div x-show="trend.accountId" x-ref="chart" style="width:100%;height:380px;"></div>
        </div>
        <button @click="tab='overview'" class="text-sm text-indigo-600 hover:underline">← 返回总览</button>
      </div>

      <!-- 模型能力页 -->
      <div x-show="tab==='models'" class="space-y-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div class="flex items-center justify-between mb-2">
            <h2 class="font-semibold text-lg">🧠 各家模型能力</h2>
            <span class="text-xs text-slate-400" x-show="modelsData.last_updated">数据更新于 <span x-text="modelsData.last_updated"></span></span>
          </div>
          <p class="text-sm text-slate-500 mb-4">
            上下文长度、思考模式、最大输出的对比。<span class="text-amber-600">⚠️ 模型能力随厂商更新而变化，此表需定期人工核实。</span>
          </p>

          <!-- 动态查询 -->
          <div class="mb-6 p-4 bg-indigo-50 rounded-lg border border-indigo-100">
            <p class="text-sm font-medium text-indigo-900 mb-2">🔄 动态查询当前可用模型</p>
            <p class="text-xs text-indigo-700 mb-3">用某账户的 key 实时拉取该家 <code>/v1/models</code>，能看到厂商新加了哪些模型。能力详情（思考/上下文）仍由静态表补充，拿不到的显示"未知"。</p>
            <div class="flex flex-wrap items-center gap-2">
              <select x-model="liveModels.accountId"
                      class="px-3 py-1.5 text-sm border border-indigo-200 rounded outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                <option value="">— 选择账户 —</option>
                <template x-for="a in accounts" :key="a.id">
                  <option :value="a.id" x-text="a.display_name + ' (' + providerDisplayName(a.provider) + ')'"></option>
                </template>
              </select>
              <button @click="loadLiveModels()" :disabled="!liveModels.accountId || liveModels.loading"
                      class="bg-indigo-600 text-white text-sm px-4 py-1.5 rounded hover:bg-indigo-700 disabled:opacity-50">
                <span x-show="!liveModels.loading">查询实时模型</span><span x-show="liveModels.loading">查询中…</span>
              </button>
              <span x-show="liveModels.error" class="text-sm text-red-500" x-text="liveModels.error"></span>
            </div>
            <div x-show="liveModels.result" class="mt-3">
              <p class="text-xs text-slate-500 mb-1">
                <span x-text="liveModels.result?.display_name"></span>：
                <span x-show="liveModels.result?.live_count !== undefined">实时 <span class="font-medium" x-text="liveModels.result?.live_count"></span> 个模型</span>
                <span x-show="liveModels.result?.live_error" class="text-amber-600">（实时拉取失败，显示静态：<span x-text="liveModels.result?.live_error"></span>）</span>
              </p>
              <div class="flex flex-wrap gap-1.5">
                <template x-for="m in (liveModels.result?.models || [])" :key="m.id">
                  <span class="inline-flex items-center gap-1 px-2 py-1 rounded text-xs bg-white border"
                        :class="m.thinking==='unknown' ? 'border-amber-200 text-amber-700' : 'border-slate-200 text-slate-600'">
                    <code class="font-mono" x-text="m.id"></code>
                    <span x-show="m.context" class="text-slate-400">· <span x-text="fmtContext(m.context)"></span></span>
                    <span x-show="m.thinking==='unknown'" class="text-amber-500">⚠️未知</span>
                  </span>
                </template>
              </div>
            </div>
          </div>

          <template x-for="(modelList, provider) in modelsData.models" :key="provider">
            <div class="mb-6">
              <h3 class="font-medium text-slate-700 mb-2 pb-1 border-b" x-text="providerDisplayName(provider)"></h3>
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="text-left text-xs text-slate-500 border-b">
                      <th class="py-2 pr-3 font-medium">模型</th>
                      <th class="py-2 px-3 font-medium">上下文</th>
                      <th class="py-2 px-3 font-medium">最大输出</th>
                      <th class="py-2 px-3 font-medium">思考模式</th>
                      <th class="py-2 pl-3 font-medium">备注</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="m in modelList" :key="m.id">
                      <tr class="border-b border-slate-100 hover:bg-slate-50">
                        <td class="py-2 pr-3">
                          <div class="font-mono text-xs text-indigo-600" x-text="m.id"></div>
                          <div class="text-xs text-slate-500" x-text="m.name"></div>
                        </td>
                        <td class="py-2 px-3">
                          <span class="font-medium" x-text="fmtContext(m.context)"></span>
                        </td>
                        <td class="py-2 px-3 text-slate-600" x-text="fmtContext(m.max_output)"></td>
                        <td class="py-2 px-3">
                          <span class="inline-block px-2 py-0.5 rounded text-xs"
                                :class="thinkingBadgeClass(m.thinking)"
                                x-text="thinkingLabel(m.thinking)"></span>
                        </td>
                        <td class="py-2 pl-3 text-xs text-slate-500 max-w-xs" x-text="m.notes"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </template>

          <!-- 调用参数速查 -->
          <div class="mt-6 p-4 bg-slate-50 rounded-lg">
            <h3 class="font-medium text-slate-700 mb-2">💡 如何开启思考模式（调用参数）</h3>
            <div class="space-y-2 text-xs">
              <template x-for="(modelList, provider) in modelsData.models" :key="'param-'+provider">
                <template x-for="m in modelList" :key="m.id">
                  <div x-show="m.thinking_param" class="flex gap-2">
                    <code class="text-indigo-600 font-mono shrink-0" x-text="m.id + ':'"></code>
                    <code class="text-slate-600 break-all" x-text="'{ ' + m.thinking_param + ' }'"></code>
                  </div>
                </template>
              </template>
            </div>
            <p class="text-xs text-slate-400 mt-3">完整调用示例见仓库根目录 USAGE.md</p>
          </div>
        </div>
        <button @click="tab='overview'" class="text-sm text-indigo-600 hover:underline">← 返回总览</button>
      </div>
    </div>
  </template>

<script>
function app() {
  return {
    loggedIn: false,
    loginPassword: '',
    loginError: '',
    loginLoading: false,
    tab: 'overview',
    accounts: [],
    providers: [],
    refreshing: false,
    lastRefresh: '',
    // 表单
    form: { provider: '', display_name: '', api_key: '' },
    creating: false,
    formError: '',
    // 趋势
    trend: { accountId: '', days: '7', points: [], loading: false, error: '', account: null, chartInstance: null },
    // 通知配置
    notify: {
      notify_serverchan_key: '', notify_telegram_bot_token: '', notify_telegram_chat_id: '',
      notify_smtp_host: '', notify_smtp_port: '', notify_smtp_user: '', notify_smtp_password: '', notify_smtp_to: '',
      alert_balance_threshold: '', alert_used_threshold: '',
      saving: false, testing: false, msg: '', ok: false, _loaded: null,
    },
    // 模型能力表
    modelsData: { last_updated: '', models: {} },
    // 动态模型查询
    liveModels: { accountId: '', loading: false, result: null, error: '' },

    async init() {
      const r = await fetch('/api/session').then(r => r.json());
      this.loggedIn = r.logged_in;
      if (this.loggedIn) { await this.loadAccounts(); }
    },
    async login() {
      this.loginError = ''; this.loginLoading = true;
      try {
        const fd = new FormData(); fd.set('password', this.loginPassword);
        const r = await fetch('/api/login', { method: 'POST', body: fd });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '登录失败'); }
        this.loggedIn = true; this.loginPassword = '';
        await this.loadAccounts();
      } catch (e) { this.loginError = e.message; }
      finally { this.loginLoading = false; }
    },
    async logout() {
      await fetch('/api/logout', { method: 'POST' });
      this.loggedIn = false; this.accounts = [];
    },
    async loadAccounts() {
      const r = await fetch('/api/accounts').then(r => r.json());
      this.accounts = r.accounts || [];
      this.updateLastRefresh();
    },
    async loadProviders() {
      if (this.providers.length) return;
      const r = await fetch('/api/providers').then(r => r.json());
      this.providers = r.providers || [];
      if (!this.form.provider && this.providers.length) this.form.provider = this.providers[0].provider;
      await this.loadNotify();
    },
    async loadNotify() {
      try {
        const r = await fetch('/api/notify/config').then(r => r.json());
        this.notify._loaded = r;
        // 非敏感字段直接回填；敏感字段（带 set/masked）不回填明文，让用户决定是否重填
        for (const k of ['alert_balance_threshold','alert_used_threshold','notify_telegram_chat_id',
                          'notify_smtp_host','notify_smtp_port','notify_smtp_user','notify_smtp_to']) {
          if (r[k]) this.notify[k] = r[k];
        }
      } catch (e) { /* 未登录等，忽略 */ }
    },
    async saveNotify() {
      this.notify.saving = true; this.notify.msg = '';
      try {
        const payload = {};
        for (const k of Object.keys(this.notify)) {
          if (['saving','testing','msg','ok','_loaded'].includes(k)) continue;
          if (this.notify[k] !== '') payload[k] = this.notify[k];
        }
        const r = await fetch('/api/notify/config', {
          method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload),
        });
        if (!r.ok) throw new Error('保存失败');
        this.notify.msg = '已保存'; this.notify.ok = true;
        setTimeout(() => this.notify.msg = '', 3000);
      } catch (e) { this.notify.msg = e.message; this.notify.ok = false; }
      finally { this.notify.saving = false; }
    },
    async testNotify() {
      this.notify.testing = true; this.notify.msg = '';
      try {
        const r = await fetch('/api/notify/test', { method:'POST' }).then(r => r.json());
        if (r.any_ok) { this.notify.msg = '✅ 测试通知已发送，请查收'; this.notify.ok = true; }
        else { this.notify.msg = '❌ 发送失败：' + JSON.stringify(r.results); this.notify.ok = false; }
      } catch (e) { this.notify.msg = e.message; this.notify.ok = false; }
      finally { this.notify.testing = false; }
    },
    async loadModels() {
      if (this.modelsData.last_updated) return;  // 只加载一次
      try {
        const r = await fetch('/api/models').then(r => r.json());
        this.modelsData = r;
      } catch (e) { console.error(e); }
    },
    async loadLiveModels() {
      if (!this.liveModels.accountId) return;
      this.liveModels.loading = true; this.liveModels.error = ''; this.liveModels.result = null;
      try {
        const r = await fetch(`/api/accounts/${this.liveModels.accountId}/models`).then(r => r.json());
        this.liveModels.result = r;
      } catch (e) { this.liveModels.error = e.message; }
      finally { this.liveModels.loading = false; }
    },
    async createAccount() {
      this.formError = ''; this.creating = true;
      try {
        const r = await fetch('/api/accounts', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify(this.form),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '添加失败'); }
        this.form = { provider: this.providers[0]?.provider || '', display_name: '', api_key: '' };
        await this.loadAccounts();
      } catch (e) { this.formError = e.message; }
      finally { this.creating = false; }
    },
    async deleteAccount(acc) {
      if (!confirm(`确认删除「${acc.display_name}」？`)) return;
      await fetch(`/api/accounts/${acc.id}`, { method: 'DELETE' });
      await this.loadAccounts();
    },
    async toggleEnabled(acc) {
      await fetch(`/api/accounts/${acc.id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ enabled: !acc.enabled }),
      });
      await this.loadAccounts();
    },
    async loadTrend() {
      if (!this.trend.accountId) { this.trend.points = []; return; }
      this.trend.loading = true; this.trend.error = '';
      try {
        const r = await fetch(`/api/accounts/${this.trend.accountId}/history?days=${this.trend.days}`).then(r => r.json());
        this.trend.account = r.account;
        this.trend.points = r.points || [];
        this.$nextTick(() => this.renderChart());
      } catch (e) { this.trend.error = e.message; }
      finally { this.trend.loading = false; }
    },
    renderChart() {
      if (!this.$refs.chart) return;
      if (!this.trend.chartInstance) {
        this.trend.chartInstance = echarts.init(this.$refs.chart);
      }
      const acc = this.trend.account;
      const pts = this.trend.points;
      const xData = pts.map(p => p.fetched_at ? new Date(p.fetched_at.replace(' ', 'T')).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '');
      let series = [], yName = '';
      if (acc && acc.type === 'balance') {
        const cur = (pts.find(p => p.currency) || {}).currency || 'CNY';
        yName = cur === 'USD' ? '余额 (USD)' : '余额 (CNY)';
        series = [{ name: '余额', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5,
          data: pts.map(p => p.balance), itemStyle: { color: '#4f46e5' },
          areaStyle: { color: 'rgba(79,70,229,0.1)' } }];
      } else {
        yName = '已用百分比 (%)';
        const hasFive = pts.some(p => p.five_hour_used != null);
        const hasWeekly = pts.some(p => p.weekly_used != null);
        series = [];
        if (hasFive) series.push({ name: '5小时窗口', type: 'line', smooth: true, symbol: 'none',
          data: pts.map(p => p.five_hour_used), itemStyle: { color: '#10b981' } });
        if (hasWeekly) series.push({ name: '每周窗口', type: 'line', smooth: true, symbol: 'none',
          data: pts.map(p => p.weekly_used), itemStyle: { color: '#f59e0b' } });
      }
      this.trend.chartInstance.setOption({
        tooltip: { trigger: 'axis' },
        legend: { top: 0 },
        grid: { left: 60, right: 20, top: 40, bottom: 60 },
        xAxis: { type: 'category', data: xData, axisLabel: { rotate: 30 } },
        yAxis: { type: 'value', name: yName, scale: acc.type !== 'balance' ? false : true,
          max: acc.type !== 'balance' ? 100 : null },
        series,
      }, true);
    },
    async refresh() {
      this.refreshing = true;
      try {
        const r = await fetch('/api/refresh', { method: 'POST' }).then(r => r.json());
        // 用接口返回的最新结果覆盖前端
        for (const res of (r.results || [])) {
          const acc = this.accounts.find(a => a.id === res.account_id);
          if (acc) acc.latest = res;
        }
        this.lastRefresh = new Date().toLocaleString('zh-CN');
      } catch (e) { alert('刷新失败: ' + e.message); }
      finally { this.refreshing = false; }
    },
    updateLastRefresh() {
      const times = this.accounts.map(a => a.latest?.fetched_at).filter(Boolean);
      if (times.length) this.lastRefresh = new Date(Math.max(...times.map(t => new Date(t)))).toLocaleString('zh-CN');
    },

    // ---- 计算属性 ----
    get errorCount() { return this.accounts.filter(a => a.latest?.raw_error).length; },
    get totalBalanceText() {
      const byCur = {};
      let any = false;
      for (const a of this.accounts) {
        if (a.latest && !a.latest.raw_error && a.latest.type === 'balance' && a.latest.balance != null) {
          const c = a.latest.currency || 'CNY';
          byCur[c] = (byCur[c] || 0) + a.latest.balance; any = true;
        }
      }
      if (!any) return '—';
      return Object.entries(byCur).map(([c, v]) => `${this.currencySymbol(c)}${this.formatBalance(v)}`).join(' + ');
    },

    // ---- 格式化 ----
    providerLabel(p) {
      const m = { deepseek: 'DeepSeek · 余额型', glm: '智谱 GLM Coding Plan', kimi: 'Kimi for Coding', minimax: 'MiniMax Coding Plan' };
      return m[p] || p;
    },
    tierLabel(t) { return { five_hour: '5 小时窗口', weekly: '每周窗口' }[t] || t; },
    currencySymbol(c) { return c === 'USD' ? '$' : c === 'CNY' ? '¥' : ''; },
    formatBalance(v) { return (v ?? 0).toLocaleString('zh-CN', { maximumFractionDigits: 2 }); },
    fmtTime(s) { try { return new Date(s).toLocaleString('zh-CN'); } catch { return s; } },
    countdown(s) {
      try {
        const ms = new Date(s).getTime() - Date.now();
        if (ms <= 0) return '即将';
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        if (h >= 24) return `${Math.floor(h/24)}天${h%24}小时`;
        if (h > 0) return `${h}小时${m}分`;
        return `${m}分钟`;
      } catch { return ''; }
    },
    // 模型能力表相关
    providerDisplayName(p) {
      return { deepseek:'DeepSeek', glm:'智谱 GLM', kimi:'Kimi (Moonshot)', minimax:'MiniMax' }[p] || p;
    },
    fmtContext(n) {
      if (n === null || n === undefined) return '未公开';
      if (n >= 1000000) return (n/1000000).toFixed(0) + 'M';
      if (n >= 1000) return (n/1000).toFixed(0) + 'K';
      return String(n);
    },
    thinkingLabel(t) {
      return { supported:'支持思考', unsupported:'不支持', default_on:'默认开启' }[t] || t;
    },
    thinkingBadgeClass(t) {
      return {
        supported: 'bg-indigo-100 text-indigo-700',
        unsupported: 'bg-slate-100 text-slate-400',
        default_on: 'bg-emerald-100 text-emerald-700',
      }[t] || 'bg-slate-100 text-slate-500';
    },
  };
}
</script>
</body>
</html>
